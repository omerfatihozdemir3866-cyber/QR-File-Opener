name: APK Derle

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: Android platformlarini kabul et ve kur
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Gradle wrapper olustur
        run: gradle wrapper --gradle-version 8.7

      - name: Calistirma izni ver
        run: chmod +x ./gradlew

      - name: APK derle
        run: ./gradlew assembleDebug --stacktrace

      - name: APK'yi yukle (indirilebilir dosya olarak)
        uses: actions/upload-artifact@v4
        with:
          name: GeziQRAcici-apk
          path: app/build/outputs/apk/debug/app-debug.apk
